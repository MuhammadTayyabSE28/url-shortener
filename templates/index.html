<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Shortener</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141E30,#243B55);
    overflow:hidden;

}

body::before{

    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00c6ff;
    border-radius:50%;
    filter:blur(170px);
    top:-150px;
    left:-150px;
    animation:move1 8s infinite alternate;

}

body::after{

    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#6a11cb;
    border-radius:50%;
    filter:blur(170px);
    bottom:-150px;
    right:-150px;
    animation:move2 8s infinite alternate;

}

.container{

    position:relative;
    width:500px;
    padding:40px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    text-align:center;
    color:white;
    animation:fadeUp .8s;

}

h1{

    font-size:42px;
    margin-bottom:10px;

}

.subtitle{

    color:#dcdcdc;
    margin-bottom:35px;

}

input{

    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin-bottom:20px;
    outline:none;

}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;

}

button:hover{

    transform:translateY(-3px);
    background:#0099ff;

}

.result{

    margin-top:30px;
    background:rgba(255,255,255,.12);
    padding:20px;
    border-radius:15px;
    animation:fadeUp .8s;

}

.result h3{

    margin-bottom:15px;

}

.result a{

    color:#00e5ff;
    text-decoration:none;
    font-weight:bold;
    word-break:break-word;

}

.result a:hover{

    text-decoration:underline;

}

.visit{

    display:inline-block;
    margin-top:18px;
    padding:12px 24px;
    background:#28a745;
    color:white !important;
    border-radius:10px;
    text-decoration:none;
    transition:.3s;

}

.visit:hover{

    background:#218838;
    transform:scale(1.05);

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@keyframes move1{

from{

transform:translate(-40px,-30px);

}

to{

transform:translate(80px,60px);

}

}

@keyframes move2{

from{

transform:translate(30px,40px);

}

to{

transform:translate(-70px,-50px);

}

}

</style>

</head>

<body>

<div class="container">

<h1>🔗 URL Shortener</h1>

<p class="subtitle">
Convert Long URLs into Short Links
</p>

<form method="POST">

<input
type="url"
name="original_url"
placeholder="Paste your long URL here..."
required
>

<button type="submit">
Generate Short URL
</button>

</form>

{% if short_url %}

<div class="result">

<h3>✅ Your Short URL</h3>

<p>

<a href="{{ short_url }}" target="_blank">

{{ short_url }}

</a>

</p>

<a href="{{ short_url }}" target="_blank" class="visit">

Visit URL

</a>

</div>

{% endif %}

</div>

</body>

</html>
